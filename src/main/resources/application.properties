spring.application.name=cleanride

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cleanride}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

spring.flyway.baselineOnMigrate=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.datasource.hikari.maximum-pool-size=5
server.port=${PORT:8080}

spring.security.user.name=${SPRING_SECURITY_USER_NAME:admin}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:admin}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.boot.web=DEBUG

supabase.url=${SUPABASE_URL:}
supabase.secret-key=${SUPABASE_SECRET_KEY:}
supabase.bucket=${SUPABASE_BUCKET:Profile_pictures}
