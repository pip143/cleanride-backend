spring.application.name=cleanride
spring.main.lazy-initialization=true
spring.jmx.enabled=false

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cleanride}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.baselineOnMigrate=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.datasource.hikari.maximum-pool-size=5
server.port=${PORT:8080}
server.address=0.0.0.0
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.db.enabled=false

spring.security.user.name=${SPRING_SECURITY_USER_NAME:admin}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:admin}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot.web=INFO
logging.level.org.hibernate=INFO

supabase.url=${SUPABASE_URL:}
supabase.secret-key=${SUPABASE_SECRET_KEY:}
supabase.bucket=${SUPABASE_BUCKET:Profile_pictures}
